  <text x="818" y="112" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b45309">Send</text>
  <text x="818" y="134" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" fill="#475569">Email with</text>
  <text x="818" y="150" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" fill="#475569">tracking</text>

  <!-- Bottom annotation -->
  <text x="450" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" font-style="italic" fill="#64748b">All orchestrated by AI, executed by deterministic scripts</text>
