<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <path d="M0,0 L5,8 L10,0" fill="none" stroke="#475569" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="600" fill="#334155">DOE Architecture</text>

  <!-- Layer 1: Directives -->
  <rect x="40" y="60" width="620" height="85" rx="12" ry="12" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="92" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#1e40af">Directives</text>
  <text x="350" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#475569">SOPs in Markdown - goals, inputs, process, outputs</text>

  <!-- Arrow 1 -->
  <line x1="350" y1="145" x2="350" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 2: Orchestration -->
  <rect x="40" y="180" width="620" height="85" rx="12" ry="12" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
  <text x="350" y="212" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#047857">Orchestration</text>
  <text x="350" y="238" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#475569">AI agent reads directives, routes to execution, handles errors</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="265" x2="350" y2="292" stroke="#475569" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 3: Execution -->
  <rect x="40" y="300" width="620" height="85" rx="12" ry="12" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="332" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#b45309">Execution</text>
  <text x="350" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#475569">Deterministic Python - API calls, data processing, file ops</text>

  <!-- Side annotation -->
  <text x="688" y="345" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="400" font-style="italic" fill="#64748b" transform="rotate(-90, 688, 345)">No probabilistic AI in execution layer</text>
</svg>