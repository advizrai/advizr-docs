<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <path d="M0,0 L5,8 L10,0" fill="none" stroke="#475569" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="600" fill="#334155">Database Isolation Architecture</text>

  <!-- Master Supabase Box -->
  <rect x="175" y="70" width="350" height="120" rx="12" ry="12" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="118" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#1e40af">Master Supabase</text>
  <text x="350" y="148" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#475569">Users, billing, routing</text>

  <!-- Lines from Master to Clients -->
  <line x1="200" y1="190" x2="120" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="350" y1="190" x2="350" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="500" y1="190" x2="580" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Routing lookup label on middle line -->
  <rect x="362" y="224" width="108" height="22" rx="4" ry="4" fill="rgba(71,85,105,0.08)"/>
  <text x="416" y="240" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="400" fill="#64748b">routing lookup</text>

  <!-- Client A -->
  <rect x="30" y="290" width="180" height="110" rx="12" ry="12" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
  <text x="120" y="330" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="600" fill="#047857">Client A</text>
  <text x="120" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#475569">Goals, docs,</text>
  <text x="120" y="374" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#475569">conversations</text>

  <!-- Client B -->
  <rect x="260" y="290" width="180" height="110" rx="12" ry="12" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
  <text x="350" y="330" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="600" fill="#047857">Client B</text>
  <text x="350" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#475569">Goals, docs,</text>
  <text x="350" y="374" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#475569">conversations</text>

  <!-- Client C -->
  <rect x="490" y="290" width="180" height="110" rx="12" ry="12" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
  <text x="580" y="330" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="600" fill="#047857">Client C</text>
  <text x="580" y="356" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#475569">Goals, docs,</text>
  <text x="580" y="374" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#475569">conversations</text>
</svg>